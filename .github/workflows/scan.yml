# ============================================================
# Internet Scanner - Main Workflow
#
# A distributed internet-wide scanner using GitHub Actions.
# Splits IPv4 into 256 blocks, scans in parallel with
# checkpointing, banner grabbing, and camera detection.
#
# DURABILITY GUARANTEES:
# - Every job saves artifacts even on failure (if: always())
# - masscan --resume support for partial scans
# - State tracking across runs
# - No work is ever lost
# - Every heavy task is chunked → no single job exceeds 6h
# ============================================================
name: Internet Scanner

on:
  workflow_dispatch:
    inputs:
      blocks:
        description: 'Number of CIDR blocks to scan (1-256, 256 = full IPv4)'
        required: true
        default: '4'
        type: choice
        options:
          - '1'
          - '4'
          - '16'
          - '64'
          - '128'
          - '256'
      rate:
        description: 'Masscan packet rate (slower = stealthier)'
        required: true
        default: '50000'
        type: choice
        options:
          - '1000'
          - '5000'
          - '10000'
          - '25000'
          - '50000'
          - '100000'
      whois:
        description: 'Run WHOIS lookup on discovered IPs'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

  schedule:
    - cron: '0 */7 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MASSCAN_RATE: ${{ github.event.inputs.rate || '100000' }}
  BLOCKS_TO_SCAN: ${{ github.event.inputs.blocks || '4' }}

jobs:

  # ============================================================
  # JOB 1: INIT - Generate CIDR ranges and check for previous state
  # ============================================================
  init:
    name: "Init - Generate Ranges"
    runs-on: ubuntu-latest
    outputs:
      blocks: ${{ steps.gen.outputs.blocks }}
      block_count: ${{ steps.gen.outputs.block_count }}
      has_previous_state: ${{ steps.gen.outputs.has_previous_state }}
      completed_blocks: ${{ steps.gen.outputs.completed_blocks }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download previous scan state (auto-resume if exists)
        id: download_state
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: scan-state
          path: previous_state

      - name: Generate CIDR blocks
        id: gen
        run: |
          SKIP_FLAG=""
          if [ -f "previous_state/scan_state.json" ]; then
            SKIP_FLAG="--skip-completed --artifact-dir previous_state"
            echo "has_previous_state=true" >> $GITHUB_OUTPUT
            echo "Resuming from previous scan state"
          else
            echo "has_previous_state=false" >> $GITHUB_OUTPUT
            echo "Starting fresh scan"
          fi
          python3 scripts/generate-ranges.py \
            --max-blocks $BLOCKS_TO_SCAN \
            $SKIP_FLAG \
            --output blocks.json
          python3 scripts/generate-matrix.py >> $GITHUB_OUTPUT
          echo 'Generated blocks (see matrix above)'

      - name: Upload blocks configuration
        uses: actions/upload-artifact@v4
        with:
          name: blocks-config
          path: blocks.json
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 2: SCAN BLOCKS - Matrix of parallel scanning jobs
  # Does: masscan + zgrab2 + nuclei + camera analysis
  # httpx runs in the dedicated http-banners job (below)
  # ============================================================
  scan:
    name: "Scan Block ${{ matrix.block.block }}"
    runs-on: ubuntu-latest
    needs: [init]
    if: ${{ fromJSON(needs.init.outputs.block_count) > 0 }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        block: ${{ fromJSON(needs.init.outputs.blocks) }}

    env:
      BLOCK_ID: ${{ matrix.block.block }}
      CIDR: ${{ matrix.block.cidr }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            masscan \
            jq \
            whois \
            bc \
            netcat-openbsd \
            2>&1 | tail -5

      - name: Install Go-based Tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest 2>&1 | tail -1
          go install github.com/zmap/zgrab2@latest 2>&1 | tail -1
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest 2>&1 | tail -1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download Checkpoint (if resuming)
        id: dl_checkpoint
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: checkpoint-${{ env.BLOCK_ID }}
          path: checkpoints

      - name: Download Previous Block Results (if resuming)
        id: dl_results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: scan-results-${{ env.BLOCK_ID }}
          path: scan_results/block_${{ env.BLOCK_ID }}

      - name: Run Block Scan
        id: scan_block
        continue-on-error: true
        run: |
          mkdir -p scan_results checkpoints
          bash scripts/scan-block.sh \
            "$BLOCK_ID" \
            "$CIDR" \
            config/ports.txt \
            "scan_results/block_$BLOCK_ID" \
            "checkpoints"

      - name: Upload Block Results (ALWAYS - even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ env.BLOCK_ID }}
          path: scan_results/block_${{ env.BLOCK_ID }}
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Checkpoint (ALWAYS - for resume)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint-${{ env.BLOCK_ID }}
          path: checkpoints/
          retention-days: 90
          if-no-files-found: warn

      - name: Report Status
        if: always()
        run: |
          if [ -f "scan_results/block_$BLOCK_ID/state_${BLOCK_ID}.json" ]; then
            echo "### Block $BLOCK_ID Status" >> $GITHUB_STEP_SUMMARY
            cat "scan_results/block_$BLOCK_ID/state_${BLOCK_ID}.json" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # JOB 3: HTTP BANNERS - httpx on chunked targets per block
  #
  # Runs as block × chunk matrix (e.g. 4 blocks × 8 chunks = 32 jobs).
  # Each chunk gets ~1/8 of HTTP targets for its block via IP hash.
  # Each job has its own 6h timeout, finishes in ~30-60 min.
  # If a chunk times out, only that 1/8 of that block's banners is lost.
  # ============================================================
  http-banners:
    name: "HTTP Banners - Block ${{ matrix.block.block }} Chunk ${{ matrix.chunk }}"
    runs-on: ubuntu-latest
    needs: [init, scan]
    if: ${{ fromJSON(needs.init.outputs.block_count) > 0 }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        block: ${{ fromJSON(needs.init.outputs.blocks) }}
        chunk: [0, 1, 2, 3, 4, 5, 6, 7]

    env:
      BLOCK_ID: ${{ matrix.block.block }}
      CHUNK_ID: ${{ matrix.chunk }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install httpx
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest 2>&1 | tail -1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download Block Scan Results
        uses: actions/download-artifact@v4
        with:
          name: scan-results-${{ env.BLOCK_ID }}
          path: scan_data

      - name: Extract HTTP Targets for this Chunk
        run: |
          python3 scripts/http-banner-chunk.py \
            "scan_data/masscan_${{ env.BLOCK_ID }}.json" \
            ${{ env.CHUNK_ID }} \
            8 \
            > http_targets_chunk.txt

      - name: Run httpx Banner Grabbing
        run: |
          if [ ! -s http_targets_chunk.txt ]; then
            echo '[]' > "http_banners_${{ env.BLOCK_ID }}_${{ env.CHUNK_ID }}.json"
            echo "No HTTP targets for this chunk"
          else
            httpx -l http_targets_chunk.txt \
              -title -status-code -server -tech-detect \
              -json -o "http_banners_${{ env.BLOCK_ID }}_${{ env.CHUNK_ID }}.json" \
              -threads 100 -timeout 5 -retries 1 \
              2>&1 || echo "httpx encountered errors (partial results saved)"
            echo "Results: $(wc -l < "http_banners_${{ env.BLOCK_ID }}_${{ env.CHUNK_ID }}.json") entries"
          fi

      - name: Upload HTTP Banner Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-banners-${{ env.BLOCK_ID }}-${{ env.CHUNK_ID }}
          path: "http_banners_${{ env.BLOCK_ID }}_${{ env.CHUNK_ID }}.json"
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  # JOB 4: WHOIS - Per-block subnet map, runs parallel with scan
  #
  # Each block independently processes its /24 subnets (~12K per run).
  # At ~1.1s/lookup, that's ~3.7h — safe margin under the 6h limit.
  # Cache persists per-block across runs (checkpoint every 100 IPs).
  # Over many cron runs, each block's cache fills up completely.
  # ============================================================
  whois:
    name: "WHOIS - Block ${{ matrix.block.block }}"
    runs-on: ubuntu-latest
    needs: [init]
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.whois == 'yes') && fromJSON(needs.init.outputs.block_count) > 0 }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        block: ${{ fromJSON(needs.init.outputs.blocks) }}

    env:
      BLOCK_ID: ${{ matrix.block.block }}
      BLOCK_CIDR: ${{ matrix.block.cidr }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq whois bc 2>&1 | tail -3

      - name: Generate /24 Subnets for this Block
        run: |
          python3 scripts/generate-subnets.py \
            --cidr "${{ env.BLOCK_CIDR }}" \
            all_subnets.txt \
            --max-subnets 12000
          echo "Subnets to process: $(wc -l < all_subnets.txt)"

      - name: Download Previous WHOIS Cache
        id: dl_cache
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: whois-cache-${{ env.BLOCK_ID }}
          path: whois_cache_prev

      - name: Restore Previous Cache
        run: |
          if [ -f "whois_cache_prev/whois_cache.json" ]; then
            cp whois_cache_prev/whois_cache.json whois_cache.json
            echo "Restored cache with $(python3 -c 'import json; print(len(json.load(open(\"whois_cache.json\"))))') entries"
          else
            echo '{}' > whois_cache.json
          fi

      - name: Run WHOIS on Block Subnets
        run: |
          bash scripts/whois-cached.sh \
            all_subnets.txt \
            whois_cache.json \
            whois_retry.json \
            whois_results.json \
            whois_checkpoint.json

      - name: Rename Results for Per-Block Artifacts
        run: |
          mv whois_results.json whois_results_${{ env.BLOCK_ID }}.json
          mv whois_retry.json whois_retry_${{ env.BLOCK_ID }}.json
          mv whois_checkpoint.json whois_checkpoint_${{ env.BLOCK_ID }}.json

      - name: Summary
        run: |
          CACHE_SIZE=$(python3 -c 'import json; print(len(json.load(open("whois_cache.json"))))' 2>/dev/null || echo 0)
          echo "### WHOIS Block ${{ env.BLOCK_ID }} Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Block CIDR: ${{ env.BLOCK_CIDR }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cache entries: $CACHE_SIZE /24 subnets mapped" >> $GITHUB_STEP_SUMMARY

      - name: Upload WHOIS Cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whois-cache-${{ env.BLOCK_ID }}
          path: whois_cache.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload WHOIS Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whois-results-${{ env.BLOCK_ID }}
          path: |
            whois_results_${{ env.BLOCK_ID }}.json
            whois_retry_${{ env.BLOCK_ID }}.json
            whois_checkpoint_${{ env.BLOCK_ID }}.json
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  # JOB 5: MERGE - Combine all results
  # Collects: scan block results + http banner chunks + whois results
  # ============================================================
  merge:
    name: "Merge - Combine All Results"
    runs-on: ubuntu-latest
    needs: [init, scan, http-banners]
    if: ${{ always() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download All Scan Results
        uses: actions/download-artifact@v4
        with:
          pattern: scan-results-*
          path: scan_results
          merge-multiple: true

      - name: Download All HTTP Banner Chunks
        uses: actions/download-artifact@v4
        with:
          pattern: http-banners-*
          path: http_banners
          merge-multiple: true

      - name: Download WHOIS Results (best-effort, may still be running)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: whois-results-*
          path: whois_data
          merge-multiple: true

      - name: Merge HTTP Banner Chunks into Scan Results
        run: |
          # Copy all chunked http_banners_*.json into scan_results/
          cp http_banners/*.json scan_results/ 2>/dev/null || true
          echo "HTTP banner chunks merged: $(ls http_banners/*.json 2>/dev/null | wc -l) files"

      - name: Run Merge Script
        run: |
          mkdir -p final_results
          bash scripts/merge-results.sh \
            scan_results \
            final_results

      - name: Copy WHOIS Data into Final Results
        continue-on-error: true
        run: |
          if ls whois_data/whois_results_*.json 1>/dev/null 2>&1; then
            cat whois_data/whois_results_*.json > final_results/all_whois.json
            echo "WHOIS data merged: $(wc -c < final_results/all_whois.json) bytes"
          fi

      - name: Run Camera Detection
        run: |
          bash scripts/camera-detect.sh \
            final_results \
            camera_report

      - name: Upload Final Results
        uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: |
            final_results/
            camera_report/
          retention-days: 90
          if-no-files-found: warn

      - name: Generate Scan Summary
        run: |
          echo "## 📡 Internet Scanner - Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "final_results/scan_summary.json" ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat final_results/scan_summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "camera_report/FINAL_REPORT.md" ]; then
            echo "### Camera Detection Report" >> $GITHUB_STEP_SUMMARY
            head -30 camera_report/FINAL_REPORT.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set Scan State (for future resumption)
        run: |
          python3 scripts/set-scan-state.py scan_results scan_state.json

      - name: Upload Scan State
        uses: actions/upload-artifact@v4
        with:
          name: scan-state
          path: scan_state.json
          retention-days: 90
          if-no-files-found: warn

      - name: Push Results to Turso (best-effort)
        continue-on-error: true
        env:
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
        run: |
          python3 scripts/push-to-turso.py final_results

  # ============================================================
  # JOB 6: REPORT - Final notification
  # ============================================================
  report:
    name: "Report - Generate Notifications"
    runs-on: ubuntu-latest
    needs: [merge]
    if: ${{ always() }}

    steps:
      - name: Download Final Report
        uses: actions/download-artifact@v4
        with:
          name: final-results
          path: final_results

      - name: Print Final Summary
        run: |
          echo "## ✅ Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The scan has finished. Download artifacts for full results." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "final_results/camera_report/FINAL_REPORT.md" ]; then
            echo "### 📷 Camera Detection Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat final_results/camera_report/FINAL_REPORT.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "final_results/all_hosts.txt" ]; then
            HOSTS=$(wc -l < final_results/all_hosts.txt)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total unique hosts found: $HOSTS**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "final_results/all_cameras.json" ]; then
            CAMS=$(wc -l < final_results/all_cameras.json)
            echo "**Potential cameras: $CAMS**" >> $GITHUB_STEP_SUMMARY
          fi
